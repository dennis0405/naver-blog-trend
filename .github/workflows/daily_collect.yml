name: Daily Blog Pipeline

on:
  schedule:
    # GitHub Actions cron is UTC. This runs at 08:00 KST.
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Stage 1 - collect Naver metadata and public bodies
        env:
          NAVER_API_PROVIDER: ${{ secrets.NAVER_API_PROVIDER }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_API_HUB_CLIENT_ID: ${{ secrets.NAVER_API_HUB_CLIENT_ID }}
          NAVER_API_HUB_CLIENT_SECRET: ${{ secrets.NAVER_API_HUB_CLIENT_SECRET }}
        run: |
          python3 -m src.collectors.collect_naver_search --date today --layers all
          python3 -m src.collectors.collect_naver_trend --date today
          python3 -m src.collectors.fetch_blog_bodies --date today --raw-dir raw

      - name: Stage 2 - rank candidates, extract reference targets, and prune retention
        run: |
          scripts/rank_targets_local.sh today
          python3 -m src.maintenance.prune_raw_data --raw-dir raw --derived-dir data/derived --report-dir data/reports/daily --keep-days 7

      - name: Commit raw data, ranking data, and reports
        run: |
          git config user.name "blog-agent-bot"
          git config user.email "blog-agent-bot@example.com"
          git add raw data/reports data/derived || true
          git commit -m "chore: daily naver blog pipeline" || echo "No changes"
          git push
