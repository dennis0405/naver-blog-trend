name: Daily Collect

on:
  schedule:
    # GitHub Actions cron is UTC. This runs at 08:00 KST.
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Collect Naver metadata and public bodies into raw directory
        env:
          NAVER_API_PROVIDER: ${{ secrets.NAVER_API_PROVIDER }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          NAVER_API_HUB_CLIENT_ID: ${{ secrets.NAVER_API_HUB_CLIENT_ID }}
          NAVER_API_HUB_CLIENT_SECRET: ${{ secrets.NAVER_API_HUB_CLIENT_SECRET }}
        run: |
          python3 -m src.collectors.collect_naver_search --date today --layers all
          python3 -m src.collectors.collect_naver_trend --date today
          python3 -m src.collectors.fetch_blog_bodies --date today --raw-dir raw
          python3 -m src.maintenance.prune_raw_data --raw-dir raw --keep-days 7

      - name: Commit raw data and collection report
        run: |
          git config user.name "blog-agent-bot"
          git config user.email "blog-agent-bot@example.com"
          git add raw data/reports || true
          git commit -m "chore: daily naver raw collection" || echo "No changes"
          git push
